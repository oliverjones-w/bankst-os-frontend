<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BankSt OS</title>
  <script>
    (() => {
      document.documentElement.classList.add("preload");
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);
      document.documentElement.style.colorScheme = savedTheme;
    })();
  </script>
  <link rel="stylesheet" href="./css/fonts.css?v=64" />
  <link rel="stylesheet" href="./css/tokens.css?v=1" />
  <link rel="stylesheet" href="./css/components.css?v=1" />
  <link rel="stylesheet" href="./css/overlays.css?v=1" />
  <link rel="stylesheet" href="./css/tables.css?v=1" />
  <link rel="stylesheet" href="./css/app-shell.css?v=12" />
  <link rel="stylesheet" href="./css/eqd.css?v=3" />
  <link rel="stylesheet" href="./css/views/log-intake.css?v=2" />
  <link rel="stylesheet" href="./css/views/article-review.css?v=1" />
  <link rel="stylesheet" href="./css/views/outlook_articles.css?v=1" />
  <link rel="stylesheet" href="./css/views/finra.css?v=1" />
  <link rel="stylesheet" href="./css/views/finra-flow.css?v=1" />
  <script>
    window.APP_CONFIG = {
      FINRA_API_BASE: "/api/finra",
      BANKST_API_BASE: "/api/core",
      MAPPING_API_BASE: "/api/mapping",
      OPS_API_BASE: "/api/ops",
      PIPELINE_API_BASE: "/api/ops",
      EQD_API_BASE: "/api/eqd",
      OUTLOOK_API_BASE: "/api/outlook_intel"
    };
  </script>
</head>
<body>
  <div class="shell">
    <main class="content">
      <header class="content-header">
        <div>
          <h1 id="viewTitle">Platform</h1>
          <p id="viewMeta" class="view-meta"></p>
        </div>
        <div class="header-actions">
          <button id="commandTrigger" class="command-trigger" type="button">
            <span class="command-trigger-label">Search & Commands</span>
            <kbd>Ctrl+P</kbd>
          </button>
          <button id="refreshBtn" class="refresh-btn" type="button">Refresh</button>
          <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme"></button>
        </div>
      </header>

      <section id="viewRoot" class="view-root" aria-live="polite"></section>
    </main>
  </div>

  <div class="overlay-root">
    <div id="cardLayer" class="card-layer"></div>
    <section id="commandPalette" class="command-palette is-hidden" aria-label="Command palette">
      <div class="command-input-row">
        <span class="command-prefix">&gt;</span>
        <input
          id="commandInput"
          class="command-input"
          type="text"
          value=""
          aria-label="Command search"
          placeholder="Open a view or run a command..."
          autocomplete="off"
        />
      </div>
      <div id="commandResults" class="command-results"></div>
      <footer class="command-footer">
        <span><kbd>Enter</kbd> open</span>
        <span><kbd>↑</kbd><kbd>↓</kbd> move</span>
        <span><kbd>Esc</kbd> close</span>
      </footer>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script type="module" src="./js/app-os.js?v=3"></script>
  <script>
    window.addEventListener("load", () => {
      document.documentElement.classList.remove("preload");
    });
  </script>
</body>
</html>
