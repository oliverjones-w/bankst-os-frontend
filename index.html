<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BankSt OS Shell</title>
  <script>
    (() => {
      document.documentElement.classList.add("preload");
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);
      document.documentElement.style.colorScheme = savedTheme;
    })();
  </script>
  <link rel="stylesheet" href="./css/fonts.css" />
  <link rel="stylesheet" href="./base.css" />
  <link rel="stylesheet" href="./css/navigation.css" />
  <link rel="stylesheet" href="./css/shell.css" />
  <link rel="stylesheet" href="./css/workspace.css" />
  <link rel="stylesheet" href="./css/surfaces.css" />
  <link rel="stylesheet" href="./css/data-views.css" />
  <script>
    window.APP_CONFIG = {
      FINRA_API_BASE:  "http://127.0.0.1:8001",
      BANKST_API_BASE: "http://127.0.0.1:8765"
    };
  </script>
</head>
<body>
  <div class="app-shell" data-right-rail="open" data-left-rail="open">

    <!-- Left rail -->
    <aside class="left-rail">
      <div class="rail-section brand-section">
        <div class="brand-mark">B</div>
        <div class="brand-text">
          <div class="brand-title">BankSt OS</div>
          <div class="brand-subtitle">Workspace Shell</div>
        </div>
      </div>

      <div class="rail-group" data-group-id="navigation">
        <div class="rail-group-header">
          <span class="chevron">›</span>
          <span class="rail-label">Navigation</span>
        </div>
        <div class="rail-group-content">
          <nav class="nav-list">
            <button class="nav-item is-active" data-open-nav-tab="people.table">People</button>
            <button class="nav-item" data-open-nav-tab="firms.table">Firms</button>
            <button class="nav-item">Mandates</button>
            <button class="nav-item">Pipeline</button>
            <button class="nav-item">Documents</button>
            <button class="nav-item">Saved Searches</button>
            <button class="nav-item">Graph</button>
            <button class="nav-item" data-open-nav-tab="master.search">Reference</button>
          </nav>
        </div>
      </div>

      <div class="rail-group" data-group-id="saved-views">
        <div class="rail-group-header">
          <span class="chevron">›</span>
          <span class="rail-label">Saved Views</span>
        </div>
        <div class="rail-group-content">
          <div class="saved-list">
            <button class="saved-item">Top Macro PMs</button>
            <button class="saved-item">Agency MBS</button>
            <button class="saved-item">Rates RV</button>
            <button class="saved-item">West Coast Crypto</button>
          </div>
        </div>
      </div>

      <div class="rail-group" data-group-id="finra">
        <div class="rail-group-header">
          <span class="chevron">›</span>
          <span class="rail-label">FINRA Monitor</span>
        </div>
        <div class="rail-group-content">
          <nav class="nav-list">
            <button class="nav-item" data-open-finra-tab="finra.monitor">Monitor</button>
          </nav>
        </div>
      </div>

      <div class="rail-group" data-group-id="workspaces">
        <div class="rail-group-header">
          <span class="chevron">›</span>
          <span class="rail-label">Workspaces</span>
        </div>
        <div class="rail-group-content">
          <div id="workspaceSnapshotList" class="saved-list"></div>
          <button id="saveWorkspaceSnapshotBtn" class="saved-item">+ Save Current</button>
        </div>
      </div>

      <div class="rail-group rail-group-bottom" data-group-id="recent" data-default-state="open">
        <div class="rail-group-header">
          <span class="chevron">›</span>
          <span class="rail-label">Recent</span>
        </div>
        <div class="rail-group-content">
          <div id="recentList" class="recent-list"></div>
        </div>
      </div>
    </aside>

    <!-- Main column -->
    <div class="main-frame">
      <header class="topbar">
        <div class="topbar-left">
          <button id="leftRailToggle" class="icon-button" aria-label="Toggle left rail">☰</button>
          <div id="topbarTitleGroup" class="topbar-title-group">
            <div class="eyebrow">Workspace</div>
            <h1 class="topbar-title">People</h1>
          </div>
        </div>

        <div class="topbar-center">
          <button id="commandTrigger" class="command-trigger">
            <span class="command-trigger-label">Search people, firms, commands…</span>
            <span class="command-trigger-kbd">Ctrl+P</span>
          </button>
        </div>

        <div class="topbar-right">
          <button class="icon-button">+</button>
          <button class="icon-button">⟲</button>
          <button id="themeToggle" class="icon-button" aria-label="Toggle theme">◐</button>
          <button id="rightRailToggle" class="icon-button" aria-label="Toggle right rail" title="Toggle context panel (Ctrl+\)">⊟</button>
          <button class="icon-button">⚙</button>
        </div>
      </header>

      <div class="workspace-row">
        <main class="workspace"></main>

        <aside class="right-rail">
          <div class="right-rail-header">
            <div>
              <div class="eyebrow">Context</div>
              <div id="rightRailTitle" class="right-rail-title">Context</div>
            </div>
            <button id="rightRailClose" class="icon-button" aria-label="Close right rail">×</button>
          </div>
          <section id="rightRailContent" class="context-panel"></section>
        </aside>
      </div>
    </div>

    <!-- Overlay root -->
    <div class="overlay-root">
      <section id="commandPalette" class="command-palette is-hidden" aria-label="Command palette">
        <div class="command-input-row">
          <span class="command-prefix">⌘</span>
          <input
            id="commandInput"
            class="command-input"
            type="text"
            value=""
            aria-label="Command search"
            placeholder="Search people, firms, commands..."
            autocomplete="off"
          />
        </div>
        <div id="commandResults" class="command-results"></div>
      </section>

      <div id="cardLayer" class="card-layer"></div>
      <div class="scrim"></div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
  <script>
    window.addEventListener("load", () => {
      document.documentElement.classList.remove("preload");
    });
  </script>
</body>
</html>
