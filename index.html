<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BankSt OS</title>
  <script>
    (() => {
      document.documentElement.classList.add("preload");
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);
      document.documentElement.style.colorScheme = savedTheme;
    })();
  </script>
  <link rel="stylesheet" href="./css/fonts.css?v=64" />
  <link rel="stylesheet" href="./css/tokens.css?v=1" />
  <link rel="stylesheet" href="./css/overlays.css?v=1" />
  <link rel="stylesheet" href="./css/app-shell.css?v=11" />
  <script>
    const shadowParam = new URLSearchParams(window.location.search).get("shadow");
    const opsApiBase = shadowParam === "1" ? "/api/ops-shadow" : "/api/ops";

    window.APP_CONFIG = {
      FINRA_API_BASE: "/api/finra",
      BANKST_API_BASE: "/api/core",
      MAPPING_API_BASE: "/api/mapping",
      OPS_API_BASE: opsApiBase,
      PIPELINE_API_BASE: opsApiBase
    };
  </script>
</head>
<body>
  <div class="shell">
    <main class="content">
      <header class="content-header">
        <div>
          <h1 id="viewTitle">Platform</h1>
          <p id="viewMeta" class="view-meta"></p>
        </div>
        <div class="header-actions">
          <button id="commandTrigger" class="command-trigger" type="button">
            <span class="command-trigger-label">Search & Commands</span>
            <kbd>Ctrl+P</kbd>
          </button>
          <button id="refreshBtn" class="refresh-btn" type="button">Refresh</button>
          <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme"></button>
        </div>
      </header>

      <div id="opsShadowBanner" class="ops-shadow-banner" hidden>
        SHADOW DATA — NOT PRODUCTION
      </div>

      <section id="viewRoot" class="view-root" aria-live="polite"></section>
    </main>
  </div>

  <div class="overlay-root">
    <div id="cardLayer" class="card-layer"></div>
    <section id="commandPalette" class="command-palette is-hidden" aria-label="Command palette">
      <div class="command-input-row">
        <span class="command-prefix">&gt;</span>
        <input
          id="commandInput"
          class="command-input"
          type="text"
          value=""
          aria-label="Command search"
          placeholder="Open a view or run a command..."
          autocomplete="off"
        />
      </div>
      <div id="commandResults" class="command-results"></div>
      <footer class="command-footer">
        <span><kbd>Enter</kbd> open</span>
        <span><kbd>↑</kbd><kbd>↓</kbd> move</span>
        <span><kbd>Esc</kbd> close</span>
      </footer>
    </section>
  </div>

  <script type="module" src="./js/app.js?v=113"></script>
  <script>
    window.addEventListener("load", () => {
      document.documentElement.classList.remove("preload");
      const opsBase = window.APP_CONFIG?.OPS_API_BASE || window.APP_CONFIG?.PIPELINE_API_BASE || "/api/ops";
      const shadowBanner = document.getElementById("opsShadowBanner");
      if (shadowBanner) shadowBanner.hidden = opsBase !== "/api/ops-shadow";
    });
  </script>
</body>
</html>
