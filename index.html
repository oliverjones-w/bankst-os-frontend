<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BankSt OS Shell</title>
  <script>
    (() => {
      document.documentElement.classList.add("preload");
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);
      document.documentElement.style.colorScheme = savedTheme;
    })();
  </script>
  <link rel="stylesheet" href="./base.css" />
  <link rel="stylesheet" href="./components.css" />
  <script>
    window.APP_CONFIG = {
      FINRA_API_BASE: "http://127.0.0.1:8001"
    };
  </script>
</head>
<body>
  <div class="app-shell" data-right-rail="open" data-left-rail="open">
    <!-- Left rail -->
    <aside class="left-rail">
      <div class="rail-section brand-section">
        <div class="brand-mark">B</div>
        <div class="brand-text">
          <div class="brand-title">BankSt OS</div>
          <div class="brand-subtitle">Workspace Shell</div>
        </div>
      </div>

      <div class="rail-section">
        <div class="rail-label">Navigation</div>
        <nav class="nav-list">
          <button class="nav-item is-active">People</button>
          <button class="nav-item">Firms</button>
          <button class="nav-item">Mandates</button>
          <button class="nav-item">Pipeline</button>
          <button class="nav-item">Documents</button>
          <button class="nav-item">Saved Searches</button>
          <button class="nav-item">Graph</button>
        </nav>
      </div>

      <div class="rail-section">
        <div class="rail-label">Saved Views</div>
        <div class="saved-list">
          <button class="saved-item">Top Macro PMs</button>
          <button class="saved-item">Agency MBS</button>
          <button class="saved-item">Rates RV</button>
          <button class="saved-item">West Coast Crypto</button>
        </div>
      </div>

      <div class="rail-section">
        <div class="rail-label">FINRA Monitor</div>
        <nav class="nav-list">
          <button class="nav-item" data-open-finra-tab="finra.dashboard">Dashboard</button>
          <button class="nav-item" data-open-finra-tab="finra.changes">Recent Changes</button>
          <button class="nav-item" data-open-finra-tab="finra.individuals">Individuals</button>
        </nav>
      </div>

      <div class="rail-section">
        <div class="rail-label">Workspaces</div>
        <div id="workspaceSnapshotList" class="saved-list"></div>
        <button id="saveWorkspaceSnapshotBtn" class="saved-item">+ Save Current</button>
      </div>

      <div class="rail-section rail-section-bottom">
        <div class="rail-label">Recent</div>
        <div class="recent-list">
          <button class="recent-item">David Flowerdew</button>
          <button class="recent-item">BNP Paribas</button>
          <button class="recent-item">Millennium</button>
        </div>
      </div>
    </aside>

    <!-- Main column -->
    <div class="main-frame">
      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-button" aria-label="Toggle left rail">☰</button>
          <div class="topbar-title-group">
            <div class="eyebrow">Workspace</div>
            <h1 class="topbar-title">People</h1>
          </div>
        </div>

        <div class="topbar-center">
          <button id="commandTrigger" class="command-trigger">
            <span class="command-trigger-label">Search people, firms, commands…</span>
            <span class="command-trigger-kbd">Ctrl+P</span>
          </button>
        </div>

        <div class="topbar-right">
          <button class="icon-button">+</button>
          <button class="icon-button">⟲</button>
          <button id="themeToggle" class="icon-button" aria-label="Toggle theme">◐</button>
          <button class="icon-button">⚙</button>
        </div>
      </header>

      <!-- Workspace row -->
      <div class="workspace-row">
        <!-- Center workspace -->
        <main class="workspace">
          <div class="pane">
            <div id="workspaceTabbar" class="tabbar"></div>

            <div class="pane-toolbar">
              <div id="workspaceToolbarLeft" class="pane-toolbar-left"></div>
              <div id="workspaceToolbarRight" class="pane-toolbar-right"></div>
            </div>

            <section id="workspaceView" class="view"></section>
          </div>
        </main>

        <!-- Right rail -->
        <aside class="right-rail">
          <div class="right-rail-header">
            <div>
              <div class="eyebrow">Context</div>
              <div id="rightRailTitle" class="right-rail-title">Context</div>
            </div>
            <button class="icon-button" aria-label="Close right rail">×</button>
          </div>

          <section id="rightRailContent" class="context-panel"></section>
        </aside>
      </div>
    </div>

    <!-- Overlay root -->
    <div class="overlay-root">
      <section id="commandPalette" class="command-palette is-hidden" aria-label="Command palette">
        <div class="command-input-row">
          <span class="command-prefix">⌘</span>
          <input
            id="commandInput"
            class="command-input"
            type="text"
            value=""
            aria-label="Command search"
            placeholder="Search people, firms, commands..."
            autocomplete="off"

      </section>

      <div id="cardLayer" class="card-layer"></div>
      <div class="scrim"></div>
    </div>
  </div>

    const rightRailContent = document.getElementById("rightRailContent");

        !rightRailTitle || !rightRailContent) return;

    const commandData = [
      { id: "open-people", type: "command", title: "Open People Table", subtitle: "Command" },
      { id: "open-firms", type: "command", title: "Open Firms Table", subtitle: "Command" },
      { id: "open-pipeline", type: "command", title: "Open Pipeline Queue", subtitle: "Command" },
      { id: "toggle-right-rail", type: "command", title: "Toggle Right Rail", subtitle: "Command" }
    ];

    let nextZ = 1200;
    let nextOffset = 0;
    const openCards = new Map();

    const workspaceState = { tabs: [], activeTabId: null };

    let paletteItems = [];
    let activePaletteIndex = 0;

    const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

    function paletteIsOpen() {
      return !palette.classList.contains("is-hidden");
    }

    function openPalette() {
      palette.classList.remove("is-hidden");
      input.value = "";
      buildPaletteResults("");
      requestAnimationFrame(() => {
        input.focus();
        input.select();
      });
    }

    function closePalette() {
      palette.classList.add("is-hidden");
      input.value = "";
      resultsEl.innerHTML = "";
      paletteItems = [];
      activePaletteIndex = 0;
    }

    function togglePalette() {
      paletteIsOpen() ? closePalette() : openPalette();
    }

    function metaHTML(meta) {
      return meta
        .map(
          ([label, value]) => `
            <div class="meta-block">
              <div class="meta-label">${label}</div>
              <div class="meta-value">${value}</div>
            </div>
          `
        )
        .join("");
    }

    function focusCard(cardEl) {
      if (!cardEl) return;
      cardEl.style.zIndex = String(++nextZ);
    }

    function closeCard(cardId) {
      const cardEl = openCards.get(cardId);
      if (!cardEl) return;
      cardEl.remove();
      openCards.delete(cardId);
    }

    function closeTopCard() {
      const topCard = [...openCards.values()]
        .sort((a, b) => Number(a.style.zIndex) - Number(b.style.zIndex))
        .pop();

      if (topCard) {
        closeCard(topCard.dataset.cardId);
      }
    }

    function makeDraggable(cardEl, handleEl) {
      let dragging = false;
      let offsetX = 0;
      let offsetY = 0;

      const onPointerMove = (e) => {
        if (!dragging) return;

        const rect = cardEl.getBoundingClientRect();
        const maxLeft = window.innerWidth - rect.width - 12;
        const maxTop = window.innerHeight - rect.height - 12;

        const nextLeft = clamp(e.clientX - offsetX, 12, maxLeft);
        const nextTop = clamp(e.clientY - offsetY, 12, maxTop);

        cardEl.style.left = `${nextLeft}px`;
        cardEl.style.top = `${nextTop}px`;
      };

      const stopDragging = () => {
        if (!dragging) return;
        dragging = false;
        cardEl.classList.remove("is-dragging");
        window.removeEventListener("pointermove", onPointerMove);
        window.removeEventListener("pointerup", stopDragging);
        window.removeEventListener("pointercancel", stopDragging);
      };

      handleEl.addEventListener("pointerdown", (e) => {
        if (e.target.closest("button")) return;

        dragging = true;
        cardEl.classList.add("is-dragging");
        focusCard(cardEl);

        const rect = cardEl.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;

        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", stopDragging);
        window.addEventListener("pointercancel", stopDragging);

        e.preventDefault();
      });
    }

    // ── Workspace view registry ───────────────────────────────────

    const workspaceViews = [];

    function registerWorkspaceView(view) {
      workspaceViews.push(view);
    }

    function resolveWorkspaceView(tab) {
      if (!tab) return null;
      return workspaceViews.find((v) => v.match(tab)) || null;
    }

    // People table
    registerWorkspaceView({
      id: "people.table",
      match: (tab) => tab.type === "people.table",
      toolbar: (tab) => ({
        left: [
          { id: "people.table.mode.table",    label: "Table",    active: tab.state?.mode === "table" },
          { id: "people.table.mode.timeline", label: "Timeline", active: tab.state?.mode === "timeline" },
          { id: "people.table.mode.graph",    label: "Graph",    active: tab.state?.mode === "graph" }
        ],
        right: [
          { id: "people.table.filter",  label: "Filter" },
          { id: "people.table.sort",    label: "Sort" },
          { id: "people.table.columns", label: "Columns" }
        ]

        if (mode === "timeline") return `<div class="table-shell view-placeholder"><span>People · Timeline</span><p>Timeline view coming soon.</p></div>`;

        return `
          <div class="table-shell">
            <div class="table-header-grid">
              <div>Name</div>
              <div>Current Firm</div>
              <div>Title</div>
              <div>Strategy</div>
              <div>Location</div>
              <div>Updated</div>
            </div>
            <div class="table-row-grid">
              <button class="cell-link" data-open-person="david-flowerdew">David Flowerdew</button>
              <div><button class="cell-link" data-open-firm="bnp-paribas">BNP Paribas</button></div>
              <div>Agency MBS Trader</div>
              <div>MBS / Rates</div>

              <div>2h ago</div>
            </div>
            <div class="table-row-grid">
              <button class="cell-link" data-open-person="kate-li">Kate Li</button>
              <div>Fidelity</div>
              <div>Data Science</div>
              <div>Digital Assets</div>

    function finraLoadingHTML(label) {

    function finraStatusBadge(status) {
      if (!status || status === "Not Found") return `<span class="finra-badge finra-badge--notfound">Not Found</span>`;
      if (status === "Inactive")            return `<span class="finra-badge finra-badge--inactive">Inactive</span>`;
      if (status === "Error")               return `<span class="finra-badge finra-badge--error">Error</span>`;
      return `<span class="finra-badge finra-badge--active">${status}</span>`;
    }

    // FINRA — Recent Changes
    registerWorkspaceView({
      id: "finra.changes",
      match: (tab) => tab.type === "finra.changes",
      toolbar: (tab) => ({
        left: [
          { id: "finra.changes.mode.feed", label: "Feed", active: (tab.state?.mode || "feed") === "feed" }

        right: [
          { id: "finra.changes.refresh", label: "Refresh" }
        ]
      }),
      onActivate: async (tab) => {
        if (tab.state?.data !== undefined || fetchingTabs.has(tab.id)) return;
        fetchingTabs.add(tab.id);
        try {
          const data = await finraGet("/api/changes?limit=100");
          finraChangesCache = data; // populate shared cache for right rail
          fetchingTabs.delete(tab.id);
          updateActiveTabState({ data, error: null });
        } catch (err) {
          fetchingTabs.delete(tab.id);
          updateActiveTabState({ data: null, error: err.message });
        }
      },
      render: (tab) => {
        if (tab.state?.error)          return finraErrorHTML("FINRA · Recent Changes", tab.state.error);
        if (tab.state?.data === undefined) return finraLoadingHTML("FINRA · Recent Changes");
        if (!tab.state.data?.length)   return `<div class="table-shell view-placeholder"><span>FINRA · Recent Changes</span><p>No changes recorded yet.</p></div>`;

        const rows = tab.state.data;

          <div class="table-shell">
            <div class="table-header-grid finra-changes-grid">
              <div>Name</div>
              <div>From</div>
              <div>To</div>

            ${rows.map((r) => `
              <div class="table-row-grid finra-changes-grid">

    function renderTabbar() {
      workspaceTabbar.innerHTML = workspaceState.tabs.map((tab) => `
        <div class="tab-wrap">

    function renderToolbarGroup(items = []) {
      return items.map((item) => `
        <button
          class="toolbar-button${item.active ? " is-active" : ""}"
          data-toolbar-action="${item.id}"
          ${item.disabled ? "disabled" : ""}

      `).join("");

    function renderWorkspaceToolbar(resolvedView, activeTab) {
      if (!workspaceToolbarLeft || !workspaceToolbarRight) return;
      const toolbarDef = typeof resolvedView?.toolbar === "function"
        ? resolvedView.toolbar(activeTab)
        : (resolvedView?.toolbar || { left: [], right: [] });
      workspaceToolbarLeft.innerHTML = renderToolbarGroup(toolbarDef.left || []);
      workspaceToolbarRight.innerHTML = renderToolbarGroup(toolbarDef.right || []);
    }

    function updateActiveTabState(patch) {
      const activeTab = workspaceState.tabs.find((t) => t.id === workspaceState.activeTabId);
      if (!activeTab) return;
      activeTab.state = { ...(activeTab.state || {}), ...patch };
      renderWorkspace();
      saveWorkspaceState();
    }

    // ── Workspace persistence ─────────────────────────────────────

    function serializeWorkspaceState() {
      return {
        activeTabId: workspaceState.activeTabId,
        tabs: workspaceState.tabs.map((tab) => ({
          id: tab.id,
          type: tab.type,
          entityType: tab.entityType || null,
          entityId: tab.entityId || null,
          title: tab.title,
          state: tab.state || {}
        }))
      };
    }

    function saveWorkspaceState() {
      try {
        localStorage.setItem(WORKSPACE_STORAGE_KEY, JSON.stringify(serializeWorkspaceState()));
      } catch (err) {
        console.error("[workspace] Failed to save state:", err);
      }
    }

    function loadWorkspaceState() {
      try {
        const raw = localStorage.getItem(WORKSPACE_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.tabs)) return null;
        return parsed;
      } catch (err) {
        console.error("[workspace] Failed to load state:", err);
        return null;
      }
    }

    function isValidRestoredTab(tab) {
      return tab && typeof tab.id === "string" && typeof tab.type === "string";
    }

    function restoreWorkspaceState(snapshot) {
      if (!snapshot || !Array.isArray(snapshot.tabs)) return false;
      const validTabs = snapshot.tabs.filter(isValidRestoredTab);
      if (!validTabs.length) return false;
      workspaceState.tabs = validTabs;
      workspaceState.activeTabId =
        validTabs.find((t) => t.id === snapshot.activeTabId)?.id || validTabs[0].id;
      return true;
    }

    // ── Workspace snapshots ───────────────────────────────────────

    function loadWorkspaceSnapshots() {
      try {
        const raw = localStorage.getItem(WORKSPACE_SNAPSHOTS_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (err) {
        console.error("[snapshots] Failed to load:", err);
        return [];
      }
    }

    function saveWorkspaceSnapshots(items) {
      try {
        localStorage.setItem(WORKSPACE_SNAPSHOTS_KEY, JSON.stringify(items));
      } catch (err) {
        console.error("[snapshots] Failed to save:", err);
      }
    }

    function createWorkspaceSnapshot(name) {
      const now = new Date().toISOString();
      const snapshots = loadWorkspaceSnapshots();
      const item = {
        id: `ws-${crypto.randomUUID()}`,
        name: name.trim(),
        createdAt: now,
        updatedAt: now,
        snapshot: serializeWorkspaceState()
      };
      snapshots.unshift(item);
      saveWorkspaceSnapshots(snapshots);
      return item;
    }

    function deleteWorkspaceSnapshot(id) {
      saveWorkspaceSnapshots(loadWorkspaceSnapshots().filter((s) => s.id !== id));
    }

    function loadWorkspaceSnapshotById(id) {
      return loadWorkspaceSnapshots().find((s) => s.id === id) || null;
    }

    function applyWorkspaceSnapshot(snapshotItem) {
      if (!snapshotItem?.snapshot) return false;
      const restored = restoreWorkspaceState(snapshotItem.snapshot);
      if (!restored) return false;
      renderWorkspace();
      saveWorkspaceState();
      return true;
    }

    const workspaceSnapshotList = document.getElementById("workspaceSnapshotList");
    const saveWorkspaceSnapshotBtn = document.getElementById("saveWorkspaceSnapshotBtn");

    function renderWorkspaceSnapshots() {
      if (!workspaceSnapshotList) return;
      const snapshots = loadWorkspaceSnapshots();

      if (!snapshots.length) {
        workspaceSnapshotList.innerHTML = `<div class="saved-item is-muted">No saved workspaces</div>`;
        return;

      workspaceSnapshotList.innerHTML = snapshots.map((item) => `

          <button class="saved-item" data-load-workspace-snapshot="${item.id}" title="${item.name}">${item.name}</button>
          <button class="tab-close" data-delete-workspace-snapshot="${item.id}" aria-label="Delete snapshot">×</button>
        </div>
      `).join("");
    }

    saveWorkspaceSnapshotBtn?.addEventListener("click", () => {

      if (!name || !name.trim()) return;
      createWorkspaceSnapshot(name);
      renderWorkspaceSnapshots();

    registerRightRailWidget({
      id: "finra-recent-moves",
      order: 10,
      when: (ctx) => ctx.type === "finra",
      render: (ctx) => {
        if (!finraChangesCache?.length) {
          return renderContextCard("Recent Moves", `
            <div class="stack-list">
              <div class="stack-item" style="color:var(--text-faint)">
                Open "Recent Changes" tab to load move history.
              </div>
            </div>
          `);
        }

        const recent = finraChangesCache.slice(0, 20);
        const feedHtml = `
          <div class="feed-list">
            ${recent.map((r) => {
              const isMove     = r.new_status && r.new_status !== "Inactive" && r.new_status !== "Not Found" && r.new_status !== "Error";
              const isInactive = r.new_status === "Inactive";
              return `
                <div class="feed-item">
                  <div class="feed-item-title">${r.name || "—"}</div>
                  <div class="feed-item-meta">
                    ${isMove     ? `→ ${r.new_status}` : ""}
                    ${isInactive ? `<span style="color:var(--color-yellow)">→ Inactive</span>` : ""}
                    ${!isMove && !isInactive ? r.new_status : ""}
                  </div>
                  <div class="feed-item-meta">${r.detected_at?.slice(0, 10) || ""}</div>
                </div>
              `;
            }).join("")}
          </div>
        `;
        return renderContextCard("Recent Moves", feedHtml);
      }
    });

    registerRightRailWidget({
      id: "finra-context-summary",
      order: 20,
      when: (ctx) => ctx.type === "finra",
      render: (ctx) => {
        const tab = ctx.tab;
        const summary = tab?.state?.summary;
        if (!summary) return "";

        return renderContextCard("Coverage", `
          <div class="meta-grid">
            <div class="meta-block"><div class="meta-label">Tracked</div><div class="meta-value">${summary.total}</div></div>
            <div class="meta-block"><div class="meta-label">Active</div><div class="meta-value">${summary.active}</div></div>
            <div class="meta-block"><div class="meta-label">Inactive</div><div class="meta-value">${summary.inactive}</div></div>
            <div class="meta-block"><div class="meta-label">Changes</div><div class="meta-value">${summary.total_changes}</div></div>
          </div>
        `);
      }
    });

    // Shared — appears on any entity detail view
    registerRightRailWidget({
      id: "quick-actions",
      order: 100,
      when: (ctx) => ctx.entityId !== undefined,
      render: (ctx) => renderContextCard("Quick Actions", `
        <div class="action-grid">
          <button class="action-btn" data-action="interaction" data-entity-id="${ctx.entityId}" data-entity-type="${ctx.type}" title="Log Interaction">
            <span>Log</span>
          </button>
          <button class="action-btn" data-action="note" data-entity-id="${ctx.entityId}" data-entity-type="${ctx.type}" title="Add Note">
            <span>Note</span>
          </button>
          <button class="action-btn" data-action="reminder" data-entity-id="${ctx.entityId}" data-entity-type="${ctx.type}" title="Set Reminder">
            <span>Remind</span>
          </button>
          <button class="action-btn" data-action="pipeline" data-entity-id="${ctx.entityId}" data-entity-type="${ctx.type}" title="Move Stage">
            <span>Stage</span>
          </button>
        </div>
      `)
    });

    // ─────────────────────────────────────────────────────────────

    function renderRightRail() {
      const context = getActiveContext();

      if (!context || context.type === "empty") {
        rightRailTitle.textContent = "Context";
        rightRailContent.innerHTML = renderContextCard(
          "No Context",
          `<div class="stack-list"><div class="stack-item">No active tab selected</div></div>`
        );
        return;
      }

      if (context.type === "person") rightRailTitle.textContent = context.entity?.title || "Person";
      else if (context.type === "firm") rightRailTitle.textContent = context.entity?.title || "Firm";
      else if (context.type === "people.table") rightRailTitle.textContent = "People Table";
      else if (context.type === "finra") rightRailTitle.textContent = "FINRA Monitor";
      else rightRailTitle.textContent = "Context";

      const widgets = rightRailWidgets
        .filter((w) => w.when(context))
        .sort((a, b) => a.order - b.order);

      rightRailContent.innerHTML = widgets.length
        ? widgets.map((w) => w.render(context)).join("")
        : renderContextCard("No Widgets",
            `<div class="stack-list"><div class="stack-item">No widgets for this context</div></div>`);
    }

    // ─────────────────────────────────────────────────────────────

    function renderWorkspace() {
      const activeTab = workspaceState.tabs.find((t) => t.id === workspaceState.activeTabId) || null;
      const resolvedView = resolveWorkspaceView(activeTab);

      renderTabbar();
      renderWorkspaceToolbar(resolvedView, activeTab);
      renderActiveView(resolvedView, activeTab);
      renderRightRail();
    }

    function focusTab(tabId) {
      workspaceState.activeTabId = tabId;
      renderWorkspace();
      saveWorkspaceState();
    }

    function openTab(tab) {
      const existing = workspaceState.tabs.find((t) => t.id === tab.id);
      if (existing) {
        focusTab(existing.id);
        return;
      }
      workspaceState.tabs.push(tab);
      workspaceState.activeTabId = tab.id;
      renderWorkspace();
      saveWorkspaceState();
    }

    function closeTab(tabId) {
      const idx = workspaceState.tabs.findIndex((t) => t.id === tabId);
      if (idx === -1) return;

      const wasActive = workspaceState.activeTabId === tabId;
      workspaceState.tabs.splice(idx, 1);

      if (wasActive) {
        const next = workspaceState.tabs[idx] || workspaceState.tabs[idx - 1] || null;
        workspaceState.activeTabId = next ? next.id : null;
      }

      renderWorkspace();
      saveWorkspaceState();
    }

    // ─────────────────────────────────────────────────────────────

    function createCard(entity) {
      const cardId = `card-${crypto.randomUUID()}`;
      const baseX = 680;
      const baseY = 140;
      const offsetStep = 28;

      const x = Math.min(baseX + nextOffset * offsetStep, window.innerWidth - 620);
      const y = Math.min(baseY + nextOffset * offsetStep, window.innerHeight - 420);
      nextOffset = (nextOffset + 1) % 6;

      const cardEl = document.createElement("article");
      cardEl.className = "floating-card";
      cardEl.dataset.cardId = cardId;
      cardEl.dataset.entityType = entity.entityType;
      cardEl.dataset.entityId = entity.entityId;
      cardEl.style.left = `${Math.max(12, x)}px`;
      cardEl.style.top = `${Math.max(12, y)}px`;
      cardEl.style.zIndex = String(++nextZ);
      cardEl.setAttribute("aria-label", `${entity.title} quick card`);

      cardEl.innerHTML = `
        <div class="floating-card-header" data-drag-handle>
          <div>
            <div class="floating-card-title">${entity.title}</div>
            <div class="floating-card-subtitle">${entity.subtitle}</div>
          </div>

          <div class="window-actions">
            <button class="window-action" data-close-card aria-label="Close">×</button>
          </div>
        </div>

        <div class="floating-card-body">
          <div class="meta-grid">
            ${metaHTML(entity.meta)}
          </div>

          <div class="floating-section">
            <div class="floating-section-title">Notes</div>
            <p class="floating-copy">${entity.notes}</p>
          </div>

          <div class="floating-section">
            <div class="floating-section-title">Quick Actions</div>
            <div class="action-row">
              <button class="toolbar-button" data-open-full-profile="${entity.entityId}">Open Full Profile</button>
              <button class="toolbar-button">Edit</button>
              <button class="toolbar-button">Add Note</button>
              <button class="toolbar-button">Log Interaction</button>
            </div>
          </div>
        </div>
      `;

      const handleEl = cardEl.querySelector("[data-drag-handle]");
      const closeBtn = cardEl.querySelector("[data-close-card]");
      const fullProfileBtn = cardEl.querySelector("[data-open-full-profile]");

      cardEl.addEventListener("pointerdown", () => focusCard(cardEl));

      closeBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        closeCard(cardId);
      });

      fullProfileBtn?.addEventListener("click", (e) => {
        e.stopPropagation();
        if (entity.entityType === "person") openPersonTab(entity.entityId);
        else openFirmTab(entity.entityId);
      });

      makeDraggable(cardEl, handleEl);

      cardLayer.appendChild(cardEl);
      openCards.set(cardId, cardEl);

      return cardEl;
    }

    function findExistingCard(entityType, entityId) {
      for (const [, cardEl] of openCards.entries()) {
        if (
          cardEl.dataset.entityType === entityType &&
          cardEl.dataset.entityId === entityId
        ) {
          return cardEl;
        }
      }
      return null;
    }

    function openCard(entityKey) {
      const entity = entityData[entityKey];
      if (!entity) return;

      const existing = findExistingCard(entity.entityType, entity.entityId);
      if (existing) {
        focusCard(existing);
        return;
      }

      createCard(entity);
    }

    function runCommand(commandId) {
      if (commandId === "toggle-right-rail") {
        const rail = document.querySelector(".right-rail");
        if (rail) {
          rail.style.display = rail.style.display === "none" ? "" : "none";
        }
      } else {
        console.log("Run command:", commandId);
      }
    }

    function scoreMatch(query, text) {
      const q = query.trim().toLowerCase();
      const t = text.toLowerCase();
      if (!q) return 1;
      if (t === q) return 100;
      if (t.startsWith(q)) return 80;
      if (t.includes(q)) return 60;

      let qi = 0;
      for (let i = 0; i < t.length && qi < q.length; i++) {
        if (t[i] === q[qi]) qi++;
      }
      return qi === q.length ? 40 : 0;
    }

    function buildPaletteResults(query) {
      const entityItems = Object.entries(entityData)
        .map(([key, entity]) => ({
          kind: "entity",
          key,
          group: entity.entityType === "person" ? "People" : "Firms",
          title: entity.title,
          subtitle: entity.entityType === "person" ? "Person" : "Firm",
          score: Math.max(
            scoreMatch(query, entity.title),
            scoreMatch(query, entity.subtitle)
          )
        }))
        .filter((item) => item.score > 0);

      const commandItems = commandData
        .map((cmd) => ({
          kind: "command",
          key: cmd.id,
          group: "Commands",
          title: cmd.title,
          subtitle: cmd.subtitle,
          score: Math.max(scoreMatch(query, cmd.title), scoreMatch(query, cmd.subtitle))
        }))
        .filter((item) => item.score > 0);

      paletteItems = [...entityItems, ...commandItems].sort((a, b) => b.score - a.score);
      activePaletteIndex = 0;

      renderPaletteResults();
    }

    function renderPaletteResults() {
      if (!paletteItems.length) {
        resultsEl.innerHTML = `
          <div class="command-group">
            <div class="command-group-label">Results</div>
            <div class="command-result">
              <span>No matches found</span>
              <span class="command-result-meta">—</span>
            </div>
          </div>
        `;
        return;
      }

      const groups = {};
      paletteItems.forEach((item, index) => {
        if (!groups[item.group]) groups[item.group] = [];
        groups[item.group].push({ ...item, index });
      });

      resultsEl.innerHTML = Object.entries(groups)
        .map(([groupName, items]) => {
          const rows = items
            .map(
              (item) => `
                <button
                  class="command-result ${item.index === activePaletteIndex ? "is-active" : ""}"
                  data-palette-index="${item.index}"
                  type="button"
                >
                  <span>${item.title}</span>
                  <span class="command-result-meta">${item.subtitle}</span>
                </button>
              `
            )
            .join("");

          return `
            <div class="command-group">
              <div class="command-group-label">${groupName}</div>
              ${rows}
            </div>
          `;
        })
        .join("");

      requestAnimationFrame(() => {
        const activeEl = resultsEl.querySelector(
          `[data-palette-index="${activePaletteIndex}"]`
        );
        activeEl?.scrollIntoView({ block: "nearest" });
      });
    }

    function activatePaletteItem(index) {
      const item = paletteItems[index];
      if (!item) return;

      if (item.kind === "entity") {
        openCard(item.key);
        closePalette();
        return;
      }

      if (item.kind === "command") {
        runCommand(item.key);
        closePalette();
      }
    }

    trigger.addEventListener("click", () => {
      togglePalette();
    });

    input.addEventListener("input", () => {
      buildPaletteResults(input.value);
    });

    resultsEl.addEventListener("click", (e) => {
      const row = e.target.closest("[data-palette-index]");
      if (!row) return;

      const index = Number(row.dataset.paletteIndex);
      activatePaletteItem(index);
    });

    resultsEl.addEventListener("pointermove", (e) => {
      const row = e.target.closest("[data-palette-index]");
      if (!row) return;

      const index = Number(row.dataset.paletteIndex);
      if (Number.isNaN(index) || index === activePaletteIndex) return;

      activePaletteIndex = index;
      renderPaletteResults();
    });

    document.addEventListener("click", (e) => {
      const tabTrigger = e.target.closest("[data-tab-id]");
      const closeTabTrigger = e.target.closest("[data-close-tab]");
      const personTrigger = e.target.closest("[data-open-person]");
      const firmTrigger = e.target.closest("[data-open-firm]");
      const actionTrigger = e.target.closest(".action-btn");
      const toolbarTrigger = e.target.closest("[data-toolbar-action]");

      if (closeTabTrigger) {
        e.stopPropagation();
        closeTab(closeTabTrigger.dataset.closeTab);
        return;
      }

      if (tabTrigger) {
        focusTab(tabTrigger.dataset.tabId);
        return;
      }

      if (personTrigger) {
        openCard(personTrigger.dataset.openPerson);
        return;
      }

      if (firmTrigger) {
        openCard(firmTrigger.dataset.openFirm);
        return;
      }

      if (toolbarTrigger) {
        handleToolbarAction(toolbarTrigger.dataset.toolbarAction);
        return;
      }

      const finraTabTrigger = e.target.closest("[data-open-finra-tab]");
      if (finraTabTrigger) {
        openFinraTab(finraTabTrigger.dataset.openFinraTab);
        return;
      }

      const loadSnapshotTrigger = e.target.closest("[data-load-workspace-snapshot]");
      if (loadSnapshotTrigger) {
        const item = loadWorkspaceSnapshotById(loadSnapshotTrigger.dataset.loadWorkspaceSnapshot);
        if (item) applyWorkspaceSnapshot(item);
        return;
      }

      const deleteSnapshotTrigger = e.target.closest("[data-delete-workspace-snapshot]");
      if (deleteSnapshotTrigger) {
        deleteWorkspaceSnapshot(deleteSnapshotTrigger.dataset.deleteWorkspaceSnapshot);
        renderWorkspaceSnapshots();
        return;
      }

      if (actionTrigger) {
        const { action, entityId, entityType } = actionTrigger.dataset;
        handleQuickAction(action, entityId, entityType);
      }
    });

    function handleQuickAction(action, entityId, entityType) {
      // Target tables:
      //   interaction  → public.interaction  (person_id | firm_id, user_id, interaction_type)
      //   note         → public.person_notes (person_id, content, created_by)
      //   reminder     → public.reminder     (entity_id, entity_type, remind_at, user_id)
      //   pipeline     → public.pipeline_item (stage_id, priority)
      console.log(`[quick-action] ${action} → ${entityType}:${entityId}`);
      // TODO: openActionModal(action, { entityId, entityType });
    }

    document.addEventListener("pointerdown", (e) => {
      if (!paletteIsOpen()) return;

      const clickedInsidePalette = e.target.closest("#commandPalette");
      const clickedTrigger = e.target.closest("#commandTrigger");

      if (!clickedInsidePalette && !clickedTrigger) {
        closePalette();
      }
    });

    document.addEventListener("keydown", (e) => {
      const isCmdP = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "p";

      if (isCmdP) {
        e.preventDefault();
        togglePalette();
        return;
      }

      if (e.key === "Escape") {
        if (paletteIsOpen()) {
          closePalette();
          return;
        }

        closeTopCard();
        return;
      }

      if (!paletteIsOpen()) return;

      if (e.key === "ArrowDown") {
        e.preventDefault();
        activePaletteIndex = Math.min(activePaletteIndex + 1, paletteItems.length - 1);
        renderPaletteResults();
        return;
      }

      if (e.key === "ArrowUp") {
        e.preventDefault();
        activePaletteIndex = Math.max(activePaletteIndex - 1, 0);
        renderPaletteResults();
        return;
      }

      if (e.key === "Enter") {
        e.preventDefault();
        activatePaletteItem(activePaletteIndex);
      }
    });

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.style.colorScheme = theme;
      localStorage.setItem("theme", theme);
    }

    function getTheme() {
      return document.documentElement.getAttribute("data-theme") || "dark";
    }

    function toggleTheme() {
      applyTheme(getTheme() === "dark" ? "light" : "dark");
    }

    const themeToggle = document.getElementById("themeToggle");
    themeToggle?.addEventListener("click", toggleTheme);

    const restored = restoreWorkspaceState(loadWorkspaceState());

    if (restored && workspaceState.tabs.length) {
      renderWorkspace();
    } else {
      openTab({
        id: "tab-people-table",
        type: "people.table",
        title: "People Table",
        state: { mode: "table", sort: null, filters: {}, columns: ["name", "firm", "title", "strategy", "location", "updated"] }
      });
    }

    renderWorkspaceSnapshots();
  })();
</script>
<script>
  window.addEventListener("load", () => {
    document.documentElement.classList.remove("preload");
  });
</script>
</body>
</html>
